<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>硅基员工培养 - 海外智能工作台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="employees.css" />
  <style>
    .train-page { max-width: 1320px; margin: 0 auto; padding: 24px 20px; }
    .train-back { display: inline-block; margin-bottom: 20px; font-size: 14px; color: var(--color-primary); text-decoration: none; }
    .train-back:hover { text-decoration: underline; }
    .train-no-permission { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-card); padding: 24px; color: var(--color-text-sub); text-align: center; }

    .train-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      align-items: stretch;
      min-height: calc(100vh - 130px);
    }

    .train-sidebar {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      min-height: 0;
    }

    .train-card,
    .train-history,
    .train-chat {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-light);
    }

    .train-card { padding: 20px; }
    .train-card-top { display: flex; gap: 14px; align-items: center; margin-bottom: 16px; }
    .train-card-avatar { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; background-size: cover; background-position: center; }
    .train-card-title { margin: 0 0 4px; font-size: 20px; font-weight: 700; color: var(--color-text-main); }
    .train-card-id { margin: 0; font-size: 13px; color: var(--color-text-sub); }
    .train-card-section { margin-bottom: 10px; }
    .train-card-section:last-child { margin-bottom: 0; }
    .train-card-subtitle { margin: 0 0 6px; font-size: 13px; font-weight: 600; color: var(--color-primary); }
    .train-card-text { margin: 0; font-size: 13px; line-height: 1.55; color: var(--color-text-main); }

    .train-history { display: flex; flex-direction: column; min-height: 0; }
    .train-history-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 10px; border-bottom: 1px solid var(--color-border);
    }
    .train-history-title { margin: 0; font-size: 14px; color: var(--color-text-main); }
    .train-new-chat-btn {
      border: none; border-radius: 8px; background: var(--color-primary-light);
      color: var(--color-primary); font-size: 13px; font-weight: 600;
      padding: 7px 10px; cursor: pointer;
    }
    .train-new-chat-btn:hover { background: #dff8eb; }
    .train-history-list { list-style: none; margin: 0; padding: 8px; overflow-y: auto; display: grid; gap: 6px; }
    .train-history-item {
      border: 1px solid transparent; border-radius: 8px; background: transparent;
      text-align: left; padding: 10px; cursor: pointer;
    }
    .train-history-item:hover { background: #fafafa; border-color: var(--color-border); }
    .train-history-item.active { background: var(--color-primary-light); border-color: #b5e9cc; }
    .train-history-item-title { margin: 0 0 4px; font-size: 13px; color: var(--color-text-main); font-weight: 600; }
    .train-history-item-time { margin: 0; font-size: 12px; color: var(--color-text-sub); }

    .train-chat {
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      min-height: 0;
    }
    .train-chat-head {
      padding: 14px 18px; border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .train-chat-title { margin: 0; font-size: 16px; color: var(--color-text-main); }
    .train-chat-status { margin: 0; font-size: 12px; color: var(--color-text-sub); }
    .train-chat-log {
      padding: 18px;
      overflow-y: auto;
      background: linear-gradient(180deg, #fcfffd 0%, #f7f9fa 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .train-msg { max-width: 78%; padding: 10px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .train-msg.bot { align-self: flex-start; color: var(--color-text-main); background: #ffffff; border: 1px solid var(--color-border); }
    .train-msg.user { align-self: flex-end; color: #fff; background: var(--color-primary); }
    .train-chat-tools {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-top: 1px solid var(--color-border);
      background: #fcfcfc;
    }
    .train-tool-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 11px; border: 1px solid var(--color-border); border-radius: 8px;
      background: #fff; color: var(--color-text-main); font-size: 13px; text-decoration: none; cursor: pointer;
    }
    .train-tool-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .train-chat-input-wrap {
      border-top: 1px solid var(--color-border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px;
    }
    .train-chat-input {
      width: 100%; box-sizing: border-box; border: 1px solid var(--color-border);
      border-radius: 10px; padding: 10px 12px; font-size: 14px;
      font-family: var(--font-main);
    }
    .train-chat-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(34, 181, 115, 0.15); }
    .train-send-btn {
      border: none; border-radius: 10px; background: var(--color-primary); color: #fff;
      font-size: 14px; font-weight: 600; padding: 0 16px; cursor: pointer;
    }
    .train-send-btn:hover { background: #1e9b62; }

    @media (max-width: 980px) {
      .train-layout { grid-template-columns: 1fr; min-height: auto; }
      .train-sidebar { grid-template-rows: auto auto; }
      .train-history { min-height: 300px; }
      .train-chat { min-height: 560px; }
    }
  </style>
</head>
<body class="employees-page">
  <div class="train-page">
    <a href="index.html" class="train-back">← 返回工作台</a>

              <h1 class="train-card-title" id="trainTitle"></h1>
              <p class="train-card-id" id="trainId"></p>
            </div>

        <div class="train-chat-tools">

        <div class="train-chat-input-wrap">
          <input class="train-chat-input" id="chatInput" type="text" placeholder="请输入你的调教指令，例如：优化海外节日海报提示词..." />
          <button type="button" class="train-send-btn" id="sendBtn">发送</button>
        </div>
      </section>
    </div>
  </div>

            },
            {

            },
            {
              type: 'bot',
              content: '了解。四维归因会逐项给出证据链，覆盖地域贡献、厂商适配、渠道质量与内容拉动效果。'
            },
            {

              content: '输出规范：语言务实，关键数据突出；结构按“核心指标概览→分维度归因分析→核心结论”；不编造数据，不偏离 TV 端场景。'
            },
            {

            }

        },

            },

            },

            },
            {

            },
            {

              content: '最后要做区域分层：核心贡献区、潜力增长区、流失待挽回区，并说明对整体 DAU 与播放时长的拉动或拖累。'
            },
            {

              content: '已确认，结论区会单列“TOP10 汇总 + 大波动地区专项归因 + 区域分层结论”，便于管理层快速决策。'

        {
          id: 'a3',
          title: '内容效果对比',
          time: '03-19 14:12',
          messages: [
            {
              type: 'user',
              content: '先做指标对齐：针对播放 UV、KR、播放时长三项指标，统一按“上线后 N 天”口径同期对比，消除上线时间差偏差。'
            },
            {
              type: 'bot',
              content: '收到，我会先做时间对齐，再进入横向比较，确保不同内容可比性成立。'
            },
            {
              type: 'user',
              content: '趋势呈现希望用折线图：横轴上线后天数，纵轴指标数值，不同内容用不同线条，能清楚看出走势差异。'
            },
            {
              type: 'bot',
              content: '了解，图表会分别展示 UV、KR、播放时长三张趋势线，并统一图例与刻度规范。'
            },
            {
              type: 'user',
              content: '请重点分析峰值、增速、衰减速度差异，并结合题材、推荐流量、排期策略、用户画像解释原因。'
            },
            {
              type: 'bot',
              content: '会补充“峰值出现时点 + 增长斜率 + 衰减周期”对比，给出内容表现差异的核心驱动因素。'
            },
            {
              type: 'user',
              content: '最后做价值判定：划分高价值爆款、平稳引流、低效待优化内容，并给出内容运营优化方向。'
            },
            {
              type: 'bot',
              content: '明白，结论会按三类内容输出运营动作建议，如加投策略、推荐位调整、题材补强与节奏优化。'
            }
          ]
        }
      ];
      var DEFAULT_HISTORY_SESSIONS = [
        {
          id: 'default-1',
          title: '默认训练会话',
          time: '今天 09:30',
          messages: [
            { type: 'bot', content: '你好，我是养马聊天助手。请告诉我本次要优化的任务目标。' }
          ]
        }
      ];

      function hasTrainPermission(userId, employeeId) {
        if (!userId) return false;
        var list = TRAIN_PERMISSION[String(userId)];
        return list && list.indexOf(String(employeeId)) !== -1;
      }

      function getParams() {
        var id = '';
        var user = '';
        var search = window.location.search;
        var idM = /[?&]id=([^&]+)/.exec(search);
        var userM = /[?&]user=([^&]+)/.exec(search);
        if (idM) id = decodeURIComponent(idM[1]);
        if (userM) user = decodeURIComponent(userM[1]);
        return { id: id || '0001', user: user };
      }

      function appendMessage(content, type) {
        var chatLog = document.getElementById('chatLog');
        if (!chatLog) return;
        var div = document.createElement('div');
        div.className = 'train-msg ' + type;
        div.textContent = content;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function renderSessionMessages(messages) {
        var chatLog = document.getElementById('chatLog');
        if (!chatLog) return;
        chatLog.innerHTML = '';
        (messages || []).forEach(function (msg) {
          appendMessage(msg.content, msg.type === 'user' ? 'user' : 'bot');
        });
      }

      function initHistoryList(sessions) {
        var historyList = document.getElementById('historyList');
        if (!historyList) return;
        historyList.innerHTML = '';
        sessions.forEach(function (item) {
          var li = document.createElement('li');
          li.innerHTML =
            '<button class="train-history-item" type="button">' +
            '<p class="train-history-item-title">' + item.title + '</p>' +
            '<p class="train-history-item-time">' + item.time + '</p>' +
            '</button>';
          var btn = li.firstChild;
          btn.addEventListener('click', function () {
            var allBtns = historyList.querySelectorAll('.train-history-item');
            for (var i = 0; i < allBtns.length; i += 1) allBtns[i].classList.remove('active');
            btn.classList.add('active');
            renderSessionMessages(item.messages);
          });
          historyList.appendChild(li);
        });
      }

      var params = getParams();
      var id = params.id;
      var userRole = getUserRole(params.user);
      var hasPermission =
        (userRole === 'admin' || userRole === 'trainer') &&
        (userRole === 'admin' || hasTrainPermission(params.user, id));
      var noPermEl = document.getElementById('trainNoPermission');
      var trainLayout = document.getElementById('trainLayout');

      if (!hasPermission) {
        if (noPermEl) noPermEl.style.display = 'block';
        if (trainLayout) trainLayout.style.display = 'none';
        return;
      }

      var intro = EMPLOYEE_INTROS[id];
      var title = document.getElementById('trainTitle');
      if (!intro) {
        if (title) title.textContent = '未找到该员工信息';
      } else {
        document.getElementById('trainAvatar').className = 'train-card-avatar silicon-avatar ' + intro.avatarClass;
        document.getElementById('trainTitle').textContent = intro.name;
        document.getElementById('trainId').textContent = 'ID: ' + id;
        document.getElementById('trainScope').textContent = intro.scope;
        document.getElementById('trainSkills').textContent = intro.skills;
      }

      var sessions = DEFAULT_HISTORY_SESSIONS;
      if (id === '0001') {
        sessions = DESIGNER_HISTORY_SESSIONS;
      } else if (id === '0004') {
        sessions = ANALYST_HISTORY_SESSIONS;
      }
      initHistoryList(sessions);
      appendMessage('已创建新对话。请告诉我本次养马目标。', 'bot');

      var sendBtn = document.getElementById('sendBtn');
      var chatInput = document.getElementById('chatInput');
      if (sendBtn && chatInput) {
        sendBtn.addEventListener('click', function () {
          var value = (chatInput.value || '').trim();
          if (!value) return;
          appendMessage(value, 'user');
          appendMessage('收到，我会基于当前目标给出训练建议与技能补充方案。', 'bot');
          chatInput.value = '';
        });
        chatInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') sendBtn.click();
        });
      }

      var newChatBtn = document.getElementById('newChatBtn');
      if (newChatBtn) {
        newChatBtn.addEventListener('click', function () {
          var chatLog = document.getElementById('chatLog');
          if (chatLog) chatLog.innerHTML = '';
          appendMessage('已创建新对话。请告诉我本次养马目标。', 'bot');
        });
      }

      var uploadBtn = document.getElementById('uploadBtn');
      if (uploadBtn) {
        uploadBtn.addEventListener('click', function () {
          alert('附件上传功能已预留，下一步可接入文件选择与解析能力。');
        });
      }

      var addSkillBtn = document.getElementById('addSkillBtn');
      if (addSkillBtn) {
        addSkillBtn.href = 'skill-market.html?id=' + encodeURIComponent(id) + '&user=' + encodeURIComponent(params.user || '');
      }
    })();
  </script>
