<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>硅基员工培养 - 海外智能工作台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="employees.css" />
  <style>
    .train-page { max-width: 640px; margin: 0 auto; padding: 24px 20px; }
    .train-back { display: inline-block; margin-bottom: 20px; font-size: 14px; color: var(--color-primary); text-decoration: none; }
    .train-back:hover { text-decoration: underline; }
    .train-card { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-card); padding: 24px; margin-bottom: 24px; }
    .train-card-avatar { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 12px; flex-shrink: 0; background-size: cover; background-position: center; }
    .train-card-title { margin: 0 0 4px; font-size: 20px; font-weight: 700; color: var(--color-text-main); text-align: center; }
    .train-card-id { margin: 0 0 16px; font-size: 13px; color: var(--color-text-sub); text-align: center; }
    .train-card-section { margin-bottom: 14px; }
    .train-card-section:last-of-type { margin-bottom: 0; }
    .train-card-subtitle { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: var(--color-primary); }
    .train-card-text { margin: 0; font-size: 14px; line-height: 1.6; color: var(--color-text-main); }
    .train-skill-section { background: var(--color-primary-light); border: 1px dashed var(--color-primary); border-radius: var(--radius-card); padding: 20px; text-align: center; }
    .train-skill-title { margin: 0 0 8px; font-size: 16px; font-weight: 600; color: var(--color-primary); }
    .train-skill-desc { margin: 0 0 16px; font-size: 13px; color: var(--color-text-sub); }
    .train-skill-btn { display: inline-block; padding: 10px 24px; font-size: 14px; font-weight: 600; color: #fff; background: var(--color-primary); border: none; border-radius: 10px; cursor: pointer; text-decoration: none; transition: background-color 0.15s ease; }
    .train-skill-btn:hover { background-color: #1e9b62; }
    .train-no-permission { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-card); padding: 24px; margin-bottom: 24px; color: var(--color-text-sub); text-align: center; }
  </style>
</head>
<body class="employees-page">
  <div class="train-page">
    <a href="index.html" class="train-back">← 返回工作台</a>

    <div class="train-no-permission" id="trainNoPermission" style="display: none;">
      <p class="train-card-text">您没有该硅基员工的养马权限。</p>
    </div>

    <div class="train-card" id="trainCard">
      <div class="train-card-avatar" id="trainAvatar"></div>
      <h1 class="train-card-title" id="trainTitle"></h1>
      <p class="train-card-id" id="trainId"></p>
      <div class="train-card-section">
        <h3 class="train-card-subtitle">工作范围</h3>
        <p class="train-card-text" id="trainScope"></p>
      </div>
      <div class="train-card-section">
        <h3 class="train-card-subtitle">主要技能</h3>
        <p class="train-card-text" id="trainSkills"></p>
      </div>
    </div>

    <section class="train-skill-section" id="trainSkillSection">
      <h2 class="train-skill-title">增加技能</h2>
      <p class="train-skill-desc">为该硅基员工添加或升级技能，提升协作能力</p>
      <a href="#" class="train-skill-btn" id="addSkillBtn">添加技能</a>
    </section>
  </div>

  <script>
    (function () {
      // 养马权限（与工作台一致）：用户 ID -> 可培养的员工 ID 列表
      var TRAIN_PERMISSION = {
        '1008611': ['0001', '0002', '0003', '0004', '0005'],
        '1008615': ['0001', '0002', '0003', '0004', '0005'],
        '1008617': ['0001'],
        '1008616': ['0005']
      };
      function hasTrainPermission(userId, employeeId) {
        if (!userId) return false;
        var list = TRAIN_PERMISSION[String(userId)];
        return list && list.indexOf(String(employeeId)) !== -1;
      }

      var params = (function () {
        var id = '';
        var user = '';
        var search = window.location.search;
        var idM = /[?&]id=([^&]+)/.exec(search);
        var userM = /[?&]user=([^&]+)/.exec(search);
        if (idM) id = decodeURIComponent(idM[1]);
        if (userM) user = decodeURIComponent(userM[1]);
        return { id: id || '0001', user: user };
      })();

      var EMPLOYEE_INTROS = {
        '0001': { name: '海报图设计师', avatarClass: 'role-designer', scope: '负责专辑海报、活动 KV、Banner 等视觉物料的设计与产出，支持海外市场多平台尺寸与风格适配。', skills: '专辑海报与单人/双人构图；营销素材与多尺寸适配；风格把控（潮流、治愈、商务等）；与文案、运营协作落地需求。' },
        '0002': { name: '专辑标题翻译官', avatarClass: 'role-translator', scope: '负责专辑、单曲、活动等标题与文案的中英及多语种翻译与本地化，保证语义准确、符合目标市场表达习惯。', skills: '中英互译与多语种标题；音乐/娱乐领域术语；文化适配与本地化表达；简短 slogan 与长文案翻译。' },
        '0003': { name: '海外运营文案官', avatarClass: 'role-ops', scope: '负责海外社媒与活动相关的推广文案、帖子、活动说明等内容的撰写与优化，配合运营节奏输出素材。', skills: '活动/节日/上新类推广文案；多平台帖子与 hashtag 建议；用户向与 B 端文案；与设计师、热点抓取协作。' },
        '0004': { name: '数据洞察分析师', avatarClass: 'role-analyst', scope: '负责 DAU、留存、转化等核心指标的解读与归因分析，输出数据结论与可执行建议，支持业务决策。', skills: '核心指标解读与归因；数据结论与建议输出；与运营、产品协作；报表与看板搭建。' },
        '0005': { name: '热点抓取师', avatarClass: 'role-hotspot', scope: '负责热点话题、爆款趋势的抓取与整理，为运营与内容提供选题与灵感，支持快速跟进热点。', skills: '热点与趋势识别；爆款案例与话题整理；多平台热点聚合；与运营文案、设计师协作产出。' }
      };

      var id = params.id;
      var hasPermission = hasTrainPermission(params.user, id);
      var noPermEl = document.getElementById('trainNoPermission');
      var trainCard = document.getElementById('trainCard');
      var skillSection = document.getElementById('trainSkillSection');

      if (!hasPermission) {
        if (noPermEl) noPermEl.style.display = 'block';
        if (trainCard) trainCard.style.display = 'none';
        if (skillSection) skillSection.style.display = 'none';
      } else {
        var intro = EMPLOYEE_INTROS[id];
        if (!intro) {
          trainCard.innerHTML = '<p style="text-align:center;color:var(--color-text-sub);">未找到该员工信息</p>';
        } else {
          document.getElementById('trainAvatar').className = 'train-card-avatar silicon-avatar ' + intro.avatarClass;
          document.getElementById('trainTitle').textContent = intro.name;
          document.getElementById('trainId').textContent = 'ID: ' + id;
          document.getElementById('trainScope').textContent = intro.scope;
          document.getElementById('trainSkills').textContent = intro.skills;
        }
        document.getElementById('addSkillBtn').addEventListener('click', function (e) {
          e.preventDefault();
          alert('添加技能功能即将开放，敬请期待。');
        });
      }
    })();
  </script>
</body>
</html>
